<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Target & Transparent Construction</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:40px 20px; background:linear-gradient(135deg, var(--dark-blue) 0%, var(--navy) 100%); color:var(--white); }
        .error-code { font-size:8rem; font-weight:800; color:var(--gold); line-height:1; margin-bottom:20px; }
        .error-title { font-size:2rem; font-weight:700; margin-bottom:15px; }
        .error-desc { font-size:1.1rem; opacity:0.8; max-width:500px; margin-bottom:30px; }
        .error-icon { font-size:4rem; margin-bottom:20px; color:var(--sky-blue); }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-icon"><i class="fas fa-hard-hat"></i></div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Under Construction</h1>
        <p class="error-desc">Looks like this page is still being built! Let's get you back to solid ground.</p>
        <a href="index.html" class="btn btn-primary" style="font-size:1rem;">
            <i class="fas fa-home"></i> Back to Homepage
        </a>
    </div>
</body>
</html>
